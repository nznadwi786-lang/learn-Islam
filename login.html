<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="main-title">Learn Islam - Login</title>
    <style>
        :root { --bg-color: #f8fafc; --text-color: #1e293b; --primary-color: #1b4d3e; --accent-color: #c5a059; --card-bg: #ffffff; --nav-bg: #ffffff; --border-color: #e2e8f0; }
        [data-theme="dark"] { --bg-color: #0f172a; --text-color: #f1f5f9; --primary-color: #334155; --accent-color: #f59e0b; --card-bg: #1e293b; --nav-bg: #1e293b; --border-color: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.7; }
        header { background-color: var(--nav-bg); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        
        .islamic-brand-logo { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; margin-bottom: 15px; }
        .logo-seal { background: linear-gradient(135deg, #1b4d3e, #0f3026); border: 3px double var(--accent-color); border-radius: 50%; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; padding: 10px; box-shadow: 0 4px 15px rgba(27, 77, 62, 0.2); margin-bottom: 10px; }
        .logo-seal-text { color: var(--accent-color); font-size: 14px; font-weight: bold; text-align: center; font-family: 'Traditional Arabic', 'Amiri', serif; line-height: 1.2; direction: rtl; }
        .logo-brand-name { font-size: 28px; font-weight: 800; color: var(--primary-color); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
        .logo-translation { font-size: 13px; font-weight: 600; color: #64748b; font-style: italic; max-width: 400px; }
        [data-theme="dark"] .logo-brand-name { color: #f1f5f9; }
        [data-theme="dark"] .logo-translation { color: #94a3b8; }

        .nav-menu-box { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px; }
        nav { display: flex; gap: 5px; }
        nav a { color: var(--text-color); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; }
        nav a:hover { background-color: rgba(27, 77, 62, 0.05); }
        nav a.active-nav { background-color: var(--primary-color); color: white !important; }
        .controls { display: flex; gap: 8px; }
        .controls button { padding: 8px 14px; cursor: pointer; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); border-radius: 6px; font-weight: 600; }
        .controls button.active { background-color: var(--primary-color); color: white; }
        .main-content { max-width: 500px; margin: 80px auto; padding: 0 20px; }
        .login-section { background-color: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); border-radius: 6px; }
        .btn { width: 100%; background-color: var(--accent-color); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        footer { background-color: var(--primary-color); color: white; text-align: center; padding: 35px 20px; margin-top: 120px; }
        @media (max-width: 768px) { .nav-menu-box { flex-direction: column-reverse; gap: 15px; } nav { flex-wrap: wrap; justify-content: center; } }
        [lang="ur"] *, [lang="ar"] * { direction: rtl; text-align: right; }
        [lang="ur"] .nav-menu-box, [lang="ar"] .nav-menu-box { flex-direction: row-reverse; }
    </style>
</head>
<body id="content-body" lang="en">
    <header>
        <div class="nav-container">
            <a href="index.html" class="islamic-brand-logo">
                <div class="logo-seal">
                    <div class="logo-seal-text">إِنَّ الدِّينَ<br>عِندَ اللَّهِ<br>الإِسْلَامُ</div>
                </div>
                <span class="logo-brand-name" id="main-brand-name">Learn Islam</span>
                <span class="logo-translation" id="main-logo-subtext">Indeed, the religion in the sight of Allah is Islam</span>
            </a>
            <div class="nav-menu-box">
                <nav>
                    <a href="index.html">Home</a>
                    <a href="lessons.html">Lessons</a>
                    <a href="about.html">About</a>
                    <a href="login.html" class="active-nav" id="nav-login-text">Login</a>
                </nav>
                <div class="controls">
                    <button id="btn-en" class="active" onclick="changeLanguage('en')">EN</button>
                    <button id="btn-ur" onclick="changeLanguage('ur')">اُردو</button>
                    <button id="btn-ar" onclick="changeLanguage('ar')">العربية</button>
                    <button id="theme-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="login-section">
            <h3 id="login-title" style="color: var(--primary-color); margin-bottom:25px; font-size:24px; text-align:center;">Student Login</h3>
            <form onsubmit="event.preventDefault(); alert('Login function coming soon!');">
                <div class="form-group"><label id="lbl-username">Username or Email</label><input type="text" required></div>
                <div class="form-group"><label id="lbl-password">Password</label><input type="password" required></div>
                <button type="submit" id="btn-login" class="btn">Login</button>
            </form>
        </div>
    </main>

    <footer>
        <p id="main-footer">&copy; 2026 Learn Islam. All Rights Reserved.</p>
    </footer>

    <script>
        function toggleTheme() { const currentTheme = document.body.getAttribute('data-theme'); const btn = document.getElementById('theme-btn'); if (currentTheme === 'dark') { document.body.removeAttribute('data-theme'); btn.innerText = "🌙 Dark Mode"; } else { document.body.setAttribute('data-theme', 'dark'); btn.innerText = "☀️ Light Mode"; } }
        const translations = {
            en: { title: "Learn Islam - Login", brandName: "Learn Islam", logoSub: "Indeed, the religion in the sight of Allah is Islam", loginT: "Student Login", lblUser: "Username or Email", lblPass: "Password", btnLog: "Login", footer: "&copy; 2026 Learn Islam. All Rights Reserved.", mainLoginBtn: "Login" },
            ur: { title: "اسلام سیکھیں - لاگ ان", brandName: "اسلام سیکھیں", logoSub: "بلاشبہ دین اللہ کے نزدیک صرف اسلام ہی ہے۔", loginT: "طلبہ کے لیے لاگ ان فارم", lblUser: "صارف کا نام یا ای میل", lblPass: "پاس ورڈ", btnLog: "لاگ ان کریں", footer: "&copy; 2026 اسلام سیکھیں— جملہ حقوق محفوظ ہیں۔", mainLoginBtn: "لاگ ان" },
            ar: { title: "تعلّم الإسلام - تسجيل الدخول", brandName: "تعلّم الإسلام", logoSub: "إن الدين عند الله الإسلام", loginT: "تسجيل دخول الطلاب", lblUser: "اسم المستخدم أو البريد الإلكتروني", lblPass: "كلمة المرور", btnLog: "تسجيل الدخول", footer: "&copy; 2026 تعلّم الإسلام. جميع الحقوق محفوظة.", mainLoginBtn: "تسجيل دخول" }
        };
        function changeLanguage(lang) {
            document.getElementById('content-body').setAttribute('lang', lang);
            document.getElementById('btn-en').className = (lang === 'en') ? 'active' : ''; document.getElementById('btn-ur').className = (lang === 'ur') ? 'active' : ''; document.getElementById('btn-ar').className = (lang === 'ar') ? 'active' : '';
            document.getElementById('main-title').innerText = translations[lang].title; document.getElementById('login-title').innerText = translations[lang].loginT; document.getElementById('lbl-username').innerText = translations[lang].lblUser; document.getElementById('lbl-password').innerText = translations[lang].lblPass; document.getElementById('btn-login').innerText = translations[lang].btnLog; document.getElementById('nav-login-text').innerText = translations[lang].mainLoginBtn;
            
            document.getElementById('main-brand-name').innerText = translations[lang].brandName;
            document.getElementById('main-logo-subtext').innerText = translations[lang].logoSub;
            
            document.getElementById('main-footer').innerHTML = translations[lang].footer;
        }
    </script>
</body>
</html>
